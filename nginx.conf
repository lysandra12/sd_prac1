stream {
    upstream workers_tickets {
        # Workers de tickets - ajusta puertos según corresponda
        server 127.0.0.1:9001;
        server 127.0.0.1:9002;
        server 127.0.0.1:9003;
        
        # Round-robin por defecto
        # Para mantener sesión con el mismo worker (opcional):
        # hash $remote_addr consistent;
        
        # Health checks
        # server 127.0.0.1:9001 max_fails=3 fail_timeout=30s;
    }
    
    server {
        listen 9000;                    # Puerto donde NGINX acepta conexiones
        proxy_pass workers_tickets;
        proxy_connect_timeout 5s;
        proxy_timeout 30s;
        
        # Logging (opcional)
        access_log /tmp/nginx_pyro_access.log;
        error_log /tmp/nginx_pyro_error.log;
    }
}